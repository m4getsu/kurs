{% extends 'base_auth.html' %}
{% block title %}Регистрация — Igrovorot{% endblock %}
{% block content %}
<h2>Регистрация</h2>
<div class="form-wrap">
    <form method="post" novalidate>
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn--primary" style="width:100%;justify-content:center;margin-top:8px">Зарегистрироваться</button>
    </form>
</div>
<div class="auth-card__footer">
    Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a>
</div>
{% endblock %}
