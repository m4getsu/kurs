{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Igrovorot{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-card__logo">
            <a href="/"><img src="{% static 'img/logo.png' %}" alt="Igrovorot" style="display:inline-block;width:70%;height:auto"></a>
        </div>
        {% if messages %}
            {% for message in messages %}
                <p style="text-align:center;font-size:13px;color:var(--danger);margin-bottom:12px">{{ message }}</p>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</div>
<script src="{% static 'js/validate.js' %}"></script>
</body>
</html>
