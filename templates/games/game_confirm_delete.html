{% extends 'base.html' %}
{% block title %}Удалить игру — Igrovorot{% endblock %}
{% block content %}
<div class="post-delete">
    <h1>Удалить игру</h1>
    <p>Вы уверены, что хотите удалить игру <strong style="color:var(--text)">{{ game.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn--danger">Удалить</button>
            <a href="{% url 'game_detail' game.slug %}" class="btn btn--ghost">Отмена</a>
        </div>
    </form>
</div>
{% endblock %}
